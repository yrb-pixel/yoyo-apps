<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenata - Stratégie de Financement</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #0e0e0f; --surface: #161617; --border: #2a2a2d;
    --gold: #c9a84c; --gold-dim: #8a6e30;
    --text: #e8e4dc; --muted: #7a7670;
    --red: #c0604a; --green: #6aaa8a; --blue: #5a8fcf; --purple: #9b7ecf;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; padding: 30px; font-size: 13px; line-height: 1.5; }
  
  .header { text-align: center; margin-bottom: 40px; }
  .header h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; font-weight: 300; color: var(--gold); letter-spacing: 0.05em; }
  .subtitle { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.2em; margin-top: 10px; }

  .main-layout { display: grid; grid-template-columns: 350px 1fr; gap: 30px; max-width: 1400px; margin: 0 auto; }

  /* Sidebar Params */
  .sidebar { display: flex; flex-direction: column; gap: 20px; }
  .section-card { background: var(--surface); border: 1px solid var(--border); padding: 20px; border-radius: 4px; }
  .section-title { font-size: 11px; color: var(--gold); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
  
  .input-group { margin-bottom: 15px; }
  .input-group label { display: block; font-size: 10px; color: var(--muted); text-transform: uppercase; margin-bottom: 5px; }
  .input-group input { background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--text); width: 100%; padding: 5px 0; font-family: 'DM Mono'; outline: none; transition: border-color 0.3s; }
  .input-group input:focus { border-color: var(--gold); }

  /* Dashboard */
  .dashboard { display: flex; flex-direction: column; gap: 20px; }
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  
  .stat-card { background: var(--surface); border: 1px solid var(--border); padding: 20px; position: relative; overflow: hidden; }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
  .stat-value { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; color: var(--text); }
  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 5px; }

  .progress-container { height: 4px; background: var(--border); margin-top: 15px; border-radius: 2px; }
  .progress-bar { height: 100%; background: var(--gold); border-radius: 2px; transition: width 0.5s ease; }

  .chart-container { background: var(--surface); border: 1px solid var(--border); padding: 20px; height: 400px; }
  
  .suggestion-box { background: rgba(201, 168, 76, 0.05); border: 1px solid var(--gold-dim); padding: 20px; color: var(--text); font-size: 12px; }

  @media (max-width: 1000px) { .main-layout { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="header">
  <h1>Zenata - Horizon 2026</h1>
  <div class="subtitle">Gestion du Cash-Flow & Priorités d'Investissement</div>
</div>

<div class="main-layout">
  <!-- Panneau de configuration -->
  <div class="sidebar">
    <div class="section-card">
      <div class="section-title">Disponibilités Actuelles</div>
      <div class="input-group">
        <label>Compte Attijari (MAD)</label>
        <input type="number" id="attijari" value="162000" oninput="compute()">
      </div>
      <div class="input-group">
        <label>Compte Fortuneo (€)</label>
        <input type="number" id="fortuneo" value="16000" oninput="compute()">
      </div>
      <div class="input-group">
        <label>Actions Marroc / PEA (€)</label>
        <input type="number" id="actions" value="25000" oninput="compute()">
      </div>
    </div>

    <div class="section-card">
      <div class="section-title">Paramètres Projet</div>
      <div class="input-group">
        <label>Prix Total Appartement (MAD)</label>
        <input type="number" id="totalAppart" value="722700" oninput="compute()">
      </div>
      <div class="input-group">
        <label>Date de Livraison</label>
        <input type="month" id="deliveryDate" value="2026-12" oninput="compute()">
      </div>
      <div class="input-group">
        <label>Dette Fès à rembourser (MAD)</label>
        <input type="number" id="detteFes" value="100000" oninput="compute()">
      </div>
      <div class="input-group">
        <label>Taux de Change (EUR/MAD)</label>
        <input type="number" id="eurRate" value="10.8" step="0.1" oninput="compute()">
      </div>
    </div>
  </div>

  <!-- Panneau d'affichage -->
  <div class="dashboard">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Reste à payer (Zenata)</div>
        <div id="valRemAppart" class="stat-value red">—</div>
        <div id="progTextAppart" class="stat-sub">0% financé</div>
        <div class="progress-container"><div id="progBarAppart" class="progress-bar" style="background: var(--red)"></div></div>
      </div>
      
      <div class="stat-card">
        <div class="stat-label">Besoin en épargne cash</div>
        <div id="valGap" class="stat-value gold">—</div>
        <div id="valGapEur" class="stat-sub">—</div>
      </div>

      <div class="stat-card" style="border-color: var(--purple)">
        <div class="stat-label">Effort Mensuel Cible</div>
        <div id="valMonthly" class="stat-value purple">—</div>
        <div id="valMonthsLeft" class="stat-sub">—</div>
      </div>
    </div>

    <div class="chart-container">
      <canvas id="mainChart"></canvas>
    </div>

    <div class="suggestion-box" id="analysis">
      Chargement de l'analyse...
    </div>
  </div>
</div>

<script>
let chart = null;

function formatMAD(v) { return new Intl.NumberFormat('fr-FR').format(Math.round(v)) + ' MAD'; }
function formatEUR(v) { return new Intl.NumberFormat('fr-FR', {style:'currency', currency:'EUR', maximumFractionDigits:0}).format(v); }

function compute() {
  // 1. Récupération des données
  const rate = parseFloat(document.getElementById('eurRate').value);
  const attijari = parseFloat(document.getElementById('attijari').value);
  const fortuneoMAD = parseFloat(document.getElementById('fortuneo').value) * rate;
  const actionsMAD = parseFloat(document.getElementById('actions').value) * rate;
  
  const totalAppart = parseFloat(document.getElementById('totalAppart').value);
  const resteAppart = totalAppart - 100000; // 100k déjà versés
  const detteFes = parseFloat(document.getElementById('detteFes').value);
  
  // Dates
  const [y, m] = document.getElementById('deliveryDate').value.split('-').map(Number);
  const deliveryDate = new Date(y, m - 1, 1);
  const now = new Date();
  const monthsLeft = Math.max(1, (deliveryDate.getFullYear() - now.getFullYear()) * 12 + (deliveryDate.getMonth() - now.getMonth()));

  // 2. Logique de calcul (Priorité Appartement)
  const cashActuel = attijari + fortuneoMAD;
  const gapAppart = Math.max(0, resteAppart - cashActuel);
  const effortMensuelMAD = gapAppart / monthsLeft;
  
  // 3. Mise à jour de l'UI
  document.getElementById('valRemAppart').innerText = formatMAD(resteAppart);
  document.getElementById('valGap').innerText = formatMAD(gapAppart);
  document.getElementById('valGapEur').innerText = "Soit " + formatEUR(gapAppart / rate);
  document.getElementById('valMonthly').innerText = formatEUR(effortMensuelMAD / rate) + "/m";
  document.getElementById('valMonthsLeft').innerText = "Sur " + monthsLeft + " mois restants";

  // Progress Bar
  const pctAppart = Math.min(100, (cashActuel / resteAppart) * 100);
  document.getElementById('progBarAppart').style.width = pctAppart + "%";
  document.getElementById('progTextAppart').innerText = Math.round(pctAppart) + "% du solde couvert par le cash";

  // Analyse
  const totalSecu = cashActuel + actionsMAD;
  let analyseHtml = `<strong>Analyse Stratégique :</strong><br>`;
  if (gapAppart > 0) {
    analyseHtml += `• Pour l'appartement : Il manque ${formatEUR(gapAppart/rate)}. Épargnez ${formatEUR(effortMensuelMAD/rate)} par mois d'ici fin 2026.<br>`;
  } else {
    analyseHtml += `• ✅ L'appartement est déjà auto-financé par votre cash actuel.<br>`;
  }
  
  const coverageDette = (actionsMAD / detteFes) * 100;
  analyseHtml += `• Dette de Fès : Vos actions couvrent ${Math.round(coverageDette)}% du montant. Ne les vendez qu'au dernier moment.`;
  document.getElementById('analysis').innerHTML = analyseHtml;

  updateChart(monthsLeft, cashActuel, effortMensuelMAD, resteAppart, detteFes);
}

function updateChart(months, startCash, monthly, targetAppart, targetDette) {
  const ctx = document.getElementById('mainChart').getContext('2d');
  const labels = [];
  const dataCash = [];
  const dataTarget = [];

  for (let i = 0; i <= months + 2; i++) {
    labels.push("M+" + i);
    dataCash.push(startCash + (monthly * i));
    dataTarget.push(targetAppart);
  }

  if (chart) chart.destroy();
  
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        { label: 'Projection Épargne (MAD)', data: dataCash, borderColor: '#c9a84c', tension: 0.3, fill: false },
        { label: 'Objectif Appartement', data: dataTarget, borderColor: '#c0604a', borderDash: [5, 5], pointRadius: 0 }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#7a7670', font: { family: 'DM Mono' } } } },
      scales: {
        y: { grid: { color: '#2a2a2d' }, ticks: { color: '#7a7670' } },
        x: { grid: { color: '#2a2a2d' }, ticks: { color: '#7a7670' } }
      }
    }
  });
}

// Initialisation
compute();
</script>
</body>
</html>
