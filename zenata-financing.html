<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenata Strategic Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <style>
        :root {
            --bg: #0e0e0f; --surface: #161617; --border: #2a2a2d;
            --gold: #c9a84c; --gold-dim: #8a6e30;
            --text: #e8e4dc; --muted: #7a7670;
            --red: #c0604a; --green: #6aaa8a; --purple: #9b7ecf;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'DM Mono', monospace; padding: 40px; 
            font-size: 12px; letter-spacing: -0.02em;
        }

        .container { max-width: 1200px; margin: 0 auto; }
        
        /* Header */
        .header { margin-bottom: 40px; border-left: 1px solid var(--gold); padding-left: 20px; }
        .header h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.8rem; font-weight: 300; color: var(--gold); }
        .header p { color: var(--muted); text-transform: uppercase; letter-spacing: 0.2em; font-size: 10px; margin-top: 5px; }

        .grid-layout { display: grid; grid-template-columns: 320px 1fr; gap: 30px; }

        /* Inputs */
        .panel { background: var(--surface); border: 1px solid var(--border); padding: 20px; margin-bottom: 20px; }
        .panel-title { font-size: 10px; color: var(--gold); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 15px; opacity: 0.8; }
        
        .input-item { margin-bottom: 12px; }
        .input-item label { display: block; color: var(--muted); font-size: 9px; text-transform: uppercase; margin-bottom: 4px; }
        .input-item input { 
            background: transparent; border: none; border-bottom: 1px solid var(--border); 
            color: var(--text); width: 100%; padding: 4px 0; font-family: 'DM Mono'; outline: none;
        }
        .input-item input:focus { border-color: var(--gold); }

        /* Stats Cards */
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); padding: 20px; }
        .stat-label { font-size: 9px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
        .stat-value { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; color: var(--text); }
        .stat-footer { font-size: 10px; margin-top: 8px; color: var(--muted); }

        /* Progress Bars */
        .progress-bg { height: 2px; background: var(--border); margin-top: 10px; position: relative; }
        .progress-fill { height: 100%; background: var(--gold); width: 0%; transition: 0.5s; }

        /* Charts */
        .chart-box { background: var(--surface); border: 1px solid var(--border); padding: 20px; height: 350px; }

        .analysis-box { 
            background: rgba(201, 168, 76, 0.03); border: 1px solid var(--gold-dim); 
            padding: 20px; margin-top: 20px; line-height: 1.6;
        }

        .tag { font-size: 9px; padding: 2px 6px; border: 1px solid var(--muted); color: var(--muted); text-transform: uppercase; margin-left: 8px; }
        .tag.urgent { border-color: var(--red); color: var(--red); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Zenata Horizon</h1>
        <p>Stratégie Financière & Arbitrage de Cash</p>
    </div>

    <div class="grid-layout">
        <!-- SIDEBAR : INPUTS -->
        <div class="sidebar">
            <div class="panel">
                <div class="panel-title">Disponibilités Cash</div>
                <div class="input-item">
                    <label>Attijari (MAD)</label>
                    <input type="number" id="attijari" value="162000" oninput="compute()">
                </div>
                <div class="input-item">
                    <label>Fortuneo (EUR)</label>
                    <input type="number" id="fortuneo" value="16000" oninput="compute()">
                </div>
                <div class="input-item">
                    <label>Actions / PEA (Total MAD)</label>
                    <input type="number" id="invests" value="280000" oninput="compute()">
                </div>
            </div>

            <div class="panel">
                <div class="panel-title">Engagements</div>
                <div class="input-item">
                    <label>Solde Zenata (MAD)</label>
                    <input type="number" id="soldeZenata" value="622700" oninput="compute()">
                </div>
                <div class="input-item">
                    <label>Dette Fès (MAD)</label>
                    <input type="number" id="detteFes" value="100000" oninput="compute()">
                </div>
                <div class="input-item">
                    <label>Mois restants (Déc 2026)</label>
                    <input type="number" id="months" value="21" oninput="compute()">
                </div>
                <div class="input-item">
                    <label>Taux EUR/MAD</label>
                    <input type="number" id="rate" value="10.8" step="0.1" oninput="compute()">
                </div>
            </div>
        </div>

        <!-- MAIN DASHBOARD -->
        <div class="dashboard">
            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-label">Cible Zenata <span class="tag urgent">Priorité 1</span></div>
                    <div id="ui-solde" class="stat-value">—</div>
                    <div class="progress-bg"><div id="bar-zenata" class="progress-fill" style="background: var(--red)"></div></div>
                    <div id="footer-zenata" class="stat-footer">0% financé</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Besoin Épargne Cash</div>
                    <div id="ui-gap" class="stat-value gold">—</div>
                    <div id="ui-gap-eur" class="stat-footer">—</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Effort Mensuel</div>
                    <div id="ui-effort" class="stat-value" style="color: var(--purple)">—</div>
                    <div id="ui-effort-sub" class="stat-footer">—</div>
                </div>
            </div>

            <div class="chart-box">
                <canvas id="projectionChart"></canvas>
            </div>

            <div class="analysis-box">
                <div class="panel-title" style="margin-bottom: 10px;">Analyse Stratégique</div>
                <div id="analysis-text">Analyse des flux en cours...</div>
            </div>
        </div>
    </div>
</div>

<script>
let myChart = null;

function fmtMAD(v) { return new Intl.NumberFormat('fr-FR').format(Math.round(v)) + ' MAD'; }
function fmtEUR(v) { return new Intl.NumberFormat('fr-FR', {style:'currency', currency:'EUR', maximumFractionDigits:0}).format(v); }

function compute() {
    // Data
    const rate = parseFloat(document.getElementById('rate').value);
    const attijari = parseFloat(document.getElementById('attijari').value);
    const fortuneoMAD = parseFloat(document.getElementById('fortuneo').value) * rate;
    const invests = parseFloat(document.getElementById('invests').value);
    
    const soldeZenata = parseFloat(document.getElementById('soldeZenata').value);
    const detteFes = parseFloat(document.getElementById('detteFes').value);
    const months = parseInt(document.getElementById('months').value);

    // Logic
    const totalCash = attijari + fortuneoMAD;
    const gapZenata = Math.max(0, soldeZenata - totalCash);
    const effortMensuelMAD = gapZenata / months;
    
    // UI Update
    document.getElementById('ui-solde').innerText = fmtMAD(soldeZenata);
    document.getElementById('ui-gap').innerText = fmtMAD(gapZenata);
    document.getElementById('ui-gap-eur').innerText = "Besoin total : " + fmtEUR(gapZenata/rate);
    document.getElementById('ui-effort').innerText = fmtEUR(effortMensuelMAD/rate) + "/m";
    document.getElementById('ui-effort-sub').innerText = "Soit " + fmtMAD(effortMensuelMAD) + " / mois";

    // Bars
    const pctZenata = Math.min(100, (totalCash / soldeZenata) * 100);
    document.getElementById('bar-zenata').style.width = pctZenata + "%";
    document.getElementById('footer-zenata').innerText = Math.round(pctZenata) + "% du solde couvert par le cash actuel";

    // Analyse
    let html = `• <strong>Logement :</strong> Votre cash couvre actuellement ${Math.round(pctZenata)}% du solde Zenata. `;
    html += `L'objectif est d'atteindre 100% via l'épargne mensuelle sans toucher aux investissements.<br>`;
    
    const coverageDette = (invests / detteFes) * 100;
    html += `• <strong>Dettes :</strong> Votre poche Investissements (${fmtMAD(invests)}) couvre ${Math.round(coverageDette)}% de la dette de Fès. `;
    html += `C'est votre filet de sécurité : si l'épargne faiblit, ces actifs liquideront la dette.`;
    document.getElementById('analysis-text').innerHTML = html;

    drawChart(months, totalCash, effortMensuelMAD, soldeZenata);
}

function drawChart(m, start, step, target) {
    const ctx = document.getElementById('projectionChart').getContext('2d');
    const labels = [];
    const dataPoints = [];
    const targetPoints = [];

    for (let i = 0; i <= m; i++) {
        labels.push("M" + i);
        dataPoints.push(start + (step * i));
        targetPoints.push(target);
    }

    if (myChart) myChart.destroy();
    myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Projection Épargne Cash',
                data: dataPoints,
                borderColor: '#c9a84c',
                borderWidth: 1,
                pointRadius: 0,
                tension: 0.2,
                fill: true,
                backgroundColor: 'rgba(201, 168, 76, 0.05)'
            }, {
                label: 'Cible Zenata',
                data: targetPoints,
                borderColor: '#c0604a',
                borderWidth: 1,
                borderDash: [5, 5],
                pointRadius: 0
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: { grid: { color: '#2a2a2d' }, ticks: { color: '#7a7670', font: { size: 9 } } },
                x: { grid: { display: false }, ticks: { color: '#7a7670', font: { size: 9 } } }
            },
            plugins: {
                legend: { labels: { color: '#e8e4dc', font: { family: 'DM Mono', size: 10 } } }
            }
        }
    });
}

compute();
</script>

</body>
</html>
