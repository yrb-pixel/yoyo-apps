<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Remboursements Mutuelles</title>

<style>
:root {
  --gold: #B8750A;
  --gold-bg: #FEF3DC;
  --teal: #1A6B5E;
  --teal-bg: #DCF0EC;
  --red: #B83A2A;
  --red-bg: #FDEAE7;
  --green: #1A6B3A;
  --green-bg: #DCF0E5;
  --ink: #111111;
  --sub: #555555;
  --border: #DDDDDD;
  --bg: #F4F4F4;
  --white: #FFFFFF;
  --radius: 12px;
}

/* Reset */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--ink);
  font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
  font-size: 15px;
  line-height: 1.5;
  scroll-behavior: smooth;
}

body {
  padding-bottom: env(safe-area-inset-bottom);
}

button, select, input {
  -webkit-tap-highlight-color: transparent;
}

/* Header */
.hdr {
  background: var(--white);
  border-bottom: 4px solid var(--gold);
  padding: 20px 16px 16px;
}
.hdr-eye {
  font-size: 10px;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--sub);
  margin-bottom: 6px;
}
.hdr-title {
  font-size: 26px;
  font-weight: 700;
  color: var(--ink);
}
.hdr-title span { color: var(--gold); }
.hdr-chips {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 12px;
}
.hdr-chip {
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1.5px solid;
}
.hdr-chip.gold { border-color: var(--gold); color: var(--gold); background: var(--gold-bg); }
.hdr-chip.teal { border-color: var(--teal); color: var(--teal); background: var(--teal-bg); }
.hdr-chip.grey { border-color: var(--border); color: var(--sub); background: var(--white); }

/* Tabs */
.tabs { display: flex; background: var(--white); border-bottom: 1px solid var(--border); }
.tab {
  flex: 1;
  padding: 12px 8px;
  background: transparent;
  border: none;
  font-size: 14px;
  font-weight: 600;
  color: var(--sub);
  cursor: pointer;
  border-bottom: 3px solid transparent;
}
.tab.active { color: var(--gold); border-bottom-color: var(--gold); }

/* Main */
.main {
  padding: 16px;
  max-width: 600px;
  margin: 0 auto;
}

/* Card */
.card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
}

/* Inputs */
input[type="number"], select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  font-size: 16px;
  background: var(--bg);
}

/* Button */
.cta {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
  font-weight: 700;
  background: var(--gold);
  color: white;
  margin-top: 10px;
  min-height: 48px;
}

/* Results */
#results { display: none; }
#results.show { display: block; }

</style>
</head>

<body>

<div class="hdr">
  <div class="hdr-eye">Simulateur personnel · v3.3</div>
  <div class="hdr-title">Remboursements <span>Santé</span></div>
</div>

<div class="main">

<div class="card">
  <label>PMSS</label>
  <input type="number" id="pmss" value="3925">
</div>

<div class="card">
  <label>Dépense</label>
  <input type="number" id="depense" placeholder="ex : 85">
  <button class="cta" onclick="calculate()">Calculer</button>
</div>

<div class="card" id="results">
  <h3>Résultat</h3>
  <p id="output"></p>
</div>

</div>

<script>
function calculate(){
  const pmss = parseFloat(document.getElementById("pmss").value) || 0;
  const dep = parseFloat(document.getElementById("depense").value) || 0;

  const remboursement = Math.min(dep, pmss * 0.1);

  document.getElementById("output").innerText =
    "Remboursement estimé : " + remboursement.toFixed(2) + " €";

  document.getElementById("results").classList.add("show");
}
</script>

</body>
</html>
