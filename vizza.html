      "evisa":           { label: "e-Visa",          color: "#9333EA", bg: "#F3E8FF", emoji: "💻", priority: 4 },
      "eta":             { label: "ETA",             color: "#C2410C", bg: "#FFF7ED", emoji: "📋", priority: 5 },

        let result = countries.filter(c => {
          if (touristOnly && !c.tourist) return false;
          if (selectedRegion !== "Tous" && c.region !== selectedRegion) return false;
          if (selectedStatus !== "Tous" && c.status !== selectedStatus) return false;
          if (search && !c.name.toLowerCase().includes(search.toLowerCase())) return false;
          return true;
        });
        if (sortBy === "region") {
          result.sort((a, b) => {
            const ri = regionOrder.indexOf(a.region) - regionOrder.indexOf(b.region);
            if (ri !== 0) return ri;
            return statusConfig[a.status].priority - statusConfig[b.status].priority;
          });

          result.sort((a, b) => statusConfig[a.status].priority - statusConfig[b.status].priority);
        } else {
          result.sort((a, b) => a.name.localeCompare(b.name));
        }
        return result;

        const tourist = countries.filter(c => c.tourist);

        const noVisa = tourist.filter(c => ["schengen","visa-free","visa-free-titre"].includes(c.status));

                ))}

            </div>
          </div>

          {/* Filters */}

              placeholder="Rechercher un pays..."
              value={search}
              onChange={e => setSearch(e.target.value)}
              style={{
                width: "100%", padding: "10px 14px", borderRadius: 10,
                border: "1px solid rgba(255,255,255,0.1)",
                background: "rgba(255,255,255,0.05)", color: "#E8E6E3",
                fontSize: 14, outline: "none", fontFamily: "inherit", boxSizing: "border-box",

            {/* Region pills */}
            <div style={{ display: "flex", gap: 6, overflowX: "auto", marginTop: 10, paddingBottom: 4 }}>

                  padding: "5px 12px", borderRadius: 20, border: "none",
                  fontSize: 12, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap",
                  fontFamily: "sans-serif",
                  background: selectedRegion === r ? "#D4AF37" : "rgba(255,255,255,0.07)",
                  color: selectedRegion === r ? "#0C1220" : "#9CA3AF",

              ))}
            </div>
            {/* Status pills */}

                padding: "5px 12px", borderRadius: 20, border: "none",
                fontSize: 11, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap",
                fontFamily: "sans-serif",
                background: selectedStatus === "Tous" ? "#D4AF37" : "rgba(255,255,255,0.07)",

              const cfg = statusConfig[c.status];

                      <div style={{ minWidth: 0 }}>
                        <div style={{
                          fontSize: 14, fontWeight: 600, color: "#E8E6E3",
                          whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
                        }}>{c.name}</div>
                        <div style={{ fontSize: 11, color: "#6B7280" }}>{c.region}</div>
                      </div>
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
                      {c.stay !== "—" && (
                        <span style={{ fontSize: 11, color: "#9CA3AF", fontFamily: "sans-serif" }}>{c.stay}</span>
                      )}
                      <span style={{
                        fontSize: 10, fontWeight: 700, padding: "3px 8px", borderRadius: 6,
                        background: cfg.bg, color: cfg.color,
                        whiteSpace: "nowrap", fontFamily: "sans-serif",
                      }}>{cfg.label}</span>
                    </div>
                  </div>
                  {isExpanded && (
                    <div style={{ marginTop: 10, paddingTop: 10, borderTop: "1px solid rgba(255,255,255,0.06)" }}>
                      <p style={{ fontSize: 13, color: "#D1D5DB", margin: "0 0 8px", lineHeight: 1.5 }}>{c.notes}</p>
                      <a href={c.source} target="_blank" rel="noopener noreferrer"
                        onClick={e => e.stopPropagation()}
                        style={{
                          fontSize: 11, color: "#D4AF37", textDecoration: "none",
                          display: "inline-flex", alignItems: "center", gap: 4,
                          padding: "4px 10px", borderRadius: 6,
                          background: "rgba(212,175,55,0.1)",
                          border: "1px solid rgba(212,175,55,0.2)",
                        }}>🔗 Source officielle</a>
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* Footer legend */}
          <div style={{
            position: "fixed", bottom: 0, left: 0, right: 0,
            background: "linear-gradient(transparent, #0C1220 30%)",
            padding: "30px 16px 14px",
          }}>
            <div style={{
              maxWidth: 800, margin: "0 auto",
              display: "flex", justifyContent: "center",
              flexWrap: "wrap", gap: "6px 12px",
            }}>
              {Object.entries(statusConfig).slice(0, 5).map(([key, cfg]) => (
                <span key={key} style={{ fontSize: 10, color: "#6B7280", display: "flex", alignItems: "center", gap: 3 }}>
                  <span style={{ width: 8, height: 8, borderRadius: "50%", background: cfg.color, display: "inline-block" }} />
                  {cfg.label}
                </span>
              ))}
            </div>
            <div style={{ textAlign: "center", fontSize: 9, color: "#4B5563", marginTop: 4 }}>
              Données avril 2026 — Vérifiez toujours auprès de l'ambassade avant de voyager
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<VisaExplorer />);
  </script>
</body>
</html>
