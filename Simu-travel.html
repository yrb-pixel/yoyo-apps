<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Voyage ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0d0f14;--bg2:#13161d;--bg3:#1a1e28;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e8e4dc;--muted:rgba(232,228,220,0.42);--muted2:rgba(232,228,220,0.16);
  --gold:#c9a55a;--gold2:#e8c87a;--gold-bg:rgba(201,165,90,0.1);
  --sage:#7aad82;--rose:#d4776a;--sky:#6fa8c8;--lavender:#9b8fd4;
  --amber:#d4a26a;--teal:#5fb3a0;
  --r:14px;--shadow:0 8px 40px rgba(0,0,0,0.45);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");pointer-events:none;z-index:0;}

/* HEADER */
.hdr{position:sticky;top:0;z-index:200;background:rgba(13,15,20,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 28px;}
.hdr-in{max-width:1440px;margin:0 auto;height:54px;display:flex;align-items:center;gap:14px;}
.logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;flex:1;}
.logo em{color:var(--gold);font-style:italic;}
.sync-row{display:flex;align-items:center;gap:5px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--sage);transition:background .3s;}
.sdot.syncing{background:var(--gold);animation:blink .7s infinite;}
.sdot.err{background:var(--rose);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.hbtns{display:flex;gap:7px;align-items:center;}

/* TABS */
.tabs{position:sticky;top:54px;z-index:190;background:rgba(13,15,20,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 28px;}
.tabs-in{max-width:1440px;margin:0 auto;display:flex;overflow-x:auto;scrollbar-width:none;}
.tabs-in::-webkit-scrollbar{display:none;}
.tab{padding:11px 15px;font-size:12.5px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;flex-shrink:0;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}

/* LAYOUT */
.page{display:none;}.page.active{display:block;}
.con{max-width:1440px;margin:0 auto;padding:22px 28px;}
@media(max-width:768px){.con{padding:10px;}.hdr{padding:0 12px;}.tabs{padding:0 8px;}}

/* GRIDS */
.g2{display:grid;grid-template-columns:360px 1fr;gap:20px;align-items:start;}
.g2s{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;}
@media(max-width:1100px){.g2{grid-template-columns:1fr;}}
@media(max-width:700px){.g2s{grid-template-columns:1fr;}.g3{grid-template-columns:1fr 1fr;}.g4{grid-template-columns:1fr 1fr;}}

/* CARD */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px;position:relative;overflow:hidden;animation:fadeUp .3s ease both;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(201,165,90,.2),transparent);}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.ctitle{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;margin-bottom:15px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.c-val{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--gold);}

/* FORM BASE */
.fg{margin-bottom:11px;}
.fl{display:block;font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.9px;color:var(--muted);margin-bottom:4px;}
.fi,.fs{width:100%;padding:8px 11px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'Outfit',sans-serif;font-size:13.5px;outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;}
.fi:focus,.fs:focus{border-color:rgba(201,165,90,.45);box-shadow:0 0 0 3px rgba(201,165,90,.07);}
.fi.auto-val{color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:15px;}
.fi[readonly]{opacity:.7;cursor:default;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* NIGHTS RESULT BANNER */
.nights-banner{margin-top:10px;padding:10px 13px;background:linear-gradient(135deg,rgba(122,173,130,.08),rgba(122,173,130,.03));border:1px solid rgba(122,173,130,.2);border-radius:10px;display:none;}
.nights-banner.show{display:flex;align-items:center;gap:11px;}
.nb-number{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:500;color:var(--sage);line-height:1;min-width:42px;text-align:center;}
.nb-detail{flex:1;}
.nb-label{font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--sage);margin-bottom:2px;}
.nb-breakdown{font-size:11px;color:var(--muted);line-height:1.5;}

/* FLIGHT ARRIVAL OPTIONS */
.flight-opts{margin-top:10px;display:flex;flex-direction:column;gap:8px;}
.flight-opt-group{padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;}
.flight-opt-title{font-family:'JetBrains Mono',monospace;font-size:9.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:7px;display:flex;align-items:center;gap:6px;}
.flight-opt-btns{display:flex;gap:5px;}
.fo-btn{flex:1;padding:7px 10px;border-radius:7px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-family:'Outfit',sans-serif;font-size:12px;cursor:pointer;transition:all .15s;text-align:center;line-height:1.35;}
.fo-btn.active{background:var(--gold-bg);color:var(--gold);border-color:rgba(201,165,90,.35);font-weight:500;}
.fo-btn .fo-sub{display:block;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);margin-top:2px;}

/* LISTS & BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-family:'Outfit',sans-serif;font-size:12.5px;font-weight:500;transition:all .15s;white-space:nowrap;}
.bg{background:var(--gold);color:#0d0f14;}.bg:hover{background:var(--gold2);transform:translateY(-1px);}
.bo{background:transparent;color:var(--text);border:1px solid var(--border2);}.bo:hover{border-color:rgba(255,255,255,.22);background:rgba(255,255,255,.04);}
.bsm{padding:5px 10px;font-size:11.5px;border-radius:7px;}
.br{background:rgba(212,119,106,.15);color:var(--rose);}.br:hover{background:rgba(212,119,106,.25);}

/* DATE PICKER (SIMPLIFIÉ POUR LA STRUCTURE) */
.dp-trigger{width:100%;padding:8px 11px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'Outfit',sans-serif;font-size:13.5px;cursor:pointer;display:flex;align-items:center;gap:8px;}

/* CITIES LIST */
#cities-list{display:flex;flex-direction:column;gap:10px;margin-top:10px;}
.city-item{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:12px;display:grid;grid-template-columns:1fr 80px 100px auto;gap:10px;align-items:end;animation:fadeUp .2s ease both;}

/* TOAST */
#toast{position:fixed;bottom:25px;right:25px;background:var(--bg2);border:1px solid var(--gold);padding:12px 20px;border-radius:12px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);transform:translateY(100px);opacity:0;transition:all .4s cubic-bezier(.175,.885,.32,1.275);z-index:1000;}
#toast.show{transform:translateY(0);opacity:1;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-in">
    <div class="logo">Budget <em>Voyage</em></div>
    <div class="sync-row"><div class="sdot" id="sdot"></div><span id="slbl">Connecté</span></div>
    <div class="hbtns">
      <button class="btn bo bsm" onclick="newSim()">+ Nouveau</button>
      <button class="btn bg bsm" onclick="saveSimulation()">↑ Sauvegarder</button>
    </div>
  </div>
</div>

<div class="tabs">
  <div class="tabs-in">
    <div class="tab active" id="tab-form" onclick="showPage('form')">✦ Simulation</div>
    <div class="tab" id="tab-list" onclick="showPage('list')">📂 Mes Simulations</div>
  </div>
</div>

<div class="page active" id="page-form">
  <div class="con">
    <div class="g2">
      
      <div style="display:flex;flex-direction:column;gap:16px;">
        <div class="card">
          <div class="ctitle">✈ Voyage</div>
          <div class="fg">
            <label class="fl">Nom de la simulation</label>
            <input class="fi" id="simName" type="text" placeholder="Ex: Japon Automne" oninput="updateCalc()">
          </div>
          
          <div class="fr">
            <div class="fg">
              <label class="fl">Départ</label>
              <input type="date" class="fi" id="dateFrom" onchange="updateCalc()">
            </div>
            <div class="fg">
              <label class="fl">Retour</label>
              <input type="date" class="fi" id="dateTo" onchange="updateCalc()">
            </div>
          </div>

          <div class="flight-opts" id="flight-opts" style="display:none">
            <div class="flight-opt-group">
              <div class="flight-opt-title">🛬 Vol aller — arrivée sur place</div>
              <div class="flight-opt-btns">
                <button class="fo-btn active" id="fo-dep-same" onclick="setFlightOpt('same')">Jour même</button>
                <button class="fo-btn" id="fo-dep-next" onclick="setFlightOpt('next')">Lendemain <span class="fo-sub">(vol de nuit)</span></button>
              </div>
            </div>
          </div>

          <div class="nights-banner" id="nights-banner">
            <div class="nb-number" id="nb-number">0</div>
            <div class="nb-detail">
              <div class="nb-label">Nuits d'hôtel à prévoir</div>
              <div class="nb-breakdown" id="nb-breakdown"></div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="ctitle">💰 Budget & Change</div>
          <div class="fg">
            <label class="fl">Budget Total (€)</label>
            <input class="fi" id="budget" type="number" value="3000" oninput="updateCalc()">
          </div>
          <div class="fr">
            <div class="fg"><label class="fl">Devise</label><input class="fi" id="currency" value="JPY" oninput="updateCalc()"></div>
            <div class="fg"><label class="fl">Taux (1€ = )</label><input class="fi" id="fxRate" type="number" value="160" oninput="updateCalc()"></div>
          </div>
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:16px;">
        <div class="card">
          <div class="ctitle">🗺 Itinéraire
            <span class="c-val" id="total-nights-alloc">0 nuits allouées</span>
          </div>
          <div id="cities-list"></div>
          <button class="btn bo bsm" style="margin-top:12px; width:100%" onclick="addCity()">+ Ajouter une étape</button>
        </div>

        <div class="card">
          <div class="ctitle">📊 Récapitulatif</div>
          <div style="height: 200px; position: relative;">
            <canvas id="budgetChart"></canvas>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="page" id="page-list">
  <div class="con">
    <div id="sim-list-container" class="g3"></div>
  </div>
</div>

<div id="toast"><span id="ti">✓</span><span id="tt">Enregistré</span></div>

<script>
let flightDepOpt = 'same';
let cities = [];
let chart = null;

// LOGIQUE DE CALCUL AJUSTÉE
function updateCalc() {
  const d1 = new Date(document.getElementById('dateFrom').value);
  const d2 = new Date(document.getElementById('dateTo').value);
  
  if(!isNaN(d1) && !isNaN(d2)) {
    let diffDays = Math.ceil((d2 - d1) / (1000 * 60 * 60 * 24));
    let nights = diffDays;
    
    // Seul le vol aller influe sur le calcul
    if(flightDepOpt === 'next') nights -= 1;
    nights = Math.max(0, nights);

    document.getElementById('flight-opts').style.display = 'flex';
    document.getElementById('nights-banner').classList.add('show');
    document.getElementById('nb-number').textContent = nights;
    document.getElementById('nb-breakdown').textContent = `Basé sur ${diffDays} jours d'écart ${flightDepOpt === 'next' ? '(-1 nuit vol de nuit)' : ''}`;
    
    document.getElementById('total-nights-alloc').textContent = `${sumNights()} / ${nights} nuits`;
  }
  
  renderChart();
}

function setFlightOpt(val) {
  flightDepOpt = val;
  document.getElementById('fo-dep-same').classList.toggle('active', val === 'same');
  document.getElementById('fo-dep-next').classList.toggle('active', val === 'next');
  updateCalc();
}

function addCity(name = '', nights = 0, price = 0) {
  const id = Date.now() + Math.random();
  cities.push({id, name, nights, price});
  renderCities();
}

function renderCities() {
  const container = document.getElementById('cities-list');
  container.innerHTML = '';
  cities.forEach((c, idx) => {
    const div = document.createElement('div');
    div.className = 'city-item';
    div.innerHTML = `
      <div class="fg"><label class="fl">Ville</label><input class="fi" value="${c.name}" oninput="updateCity(${idx}, 'name', this.value)"></div>
      <div class="fg"><label class="fl">Nuits</label><input class="fi" type="number" value="${c.nights}" oninput="updateCity(${idx}, 'nights', this.value)"></div>
      <div class="fg"><label class="fl">Prix/Nuit</label><input class="fi" type="number" value="${c.price}" oninput="updateCity(${idx}, 'price', this.value)"></div>
      <button class="btn br bsm" onclick="removeCity(${idx})">✕</button>
    `;
    container.appendChild(div);
  });
}

function updateCity(idx, key, val) {
  cities[idx][key] = key === 'name' ? val : parseFloat(val) || 0;
  updateCalc();
}

function removeCity(idx) {
  cities.splice(idx, 1);
  renderCities();
  updateCalc();
}

function sumNights() { return cities.reduce((sum, c) => sum + c.nights, 0); }

function renderChart() {
  const ctx = document.getElementById('budgetChart').getContext('2d');
  const totalHotel = cities.reduce((sum, c) => sum + (c.nights * c.price), 0);
  const budget = parseFloat(document.getElementById('budget').value) || 0;
  const reste = Math.max(0, budget - totalHotel);

  if(chart) chart.destroy();
  chart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Hôtels', 'Reste'],
      datasets: [{
        data: [totalHotel, reste],
        backgroundColor: ['#c9a55a', '#1a1e28'],
        borderColor: 'rgba(255,255,255,0.1)'
      }]
    },
    options: { cutout: '70%', plugins: { legend: { display: false } } }
  });
}

function showPage(p) {
  document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + p).classList.add('active');
  document.getElementById('tab-' + p).classList.add('active');
}

function toast(txt) {
  const t = document.getElementById('toast');
  document.getElementById('tt').textContent = txt;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function saveSimulation() {
  toast("Simulation enregistrée !");
  // Ici ta logique de fetch vers Google Apps Script
}

function newSim() {
  if(confirm("Créer une nouvelle simulation ?")) window.location.reload();
}

// Init
addCity('Étape 1', 0, 0);
</script>

</body>
</html>
