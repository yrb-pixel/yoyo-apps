<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Budget Voyage ✦ Expert</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Outfit:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --bg: #0d0f14; --bg2: #13161d; --bg3: #1a1e28;
  --accent: #d4875a; --text: #e8e4dc; --muted: rgba(232,228,220,0.5);
  --border: rgba(255,255,255,0.08); --radius: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; 
  background-image: radial-gradient(circle at 50% 0%, #1e2535 0%, var(--bg) 80%);
  padding: 20px;
}
.container { max-width: 1300px; margin: 0 auto; display: grid; grid-template-columns: 1fr 420px; gap: 25px; }
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; }
h2 { font-family: 'Cormorant Garamond', serif; font-size: 24px; margin-bottom: 20px; color: var(--accent); }

/* Formulaire */
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
.f-group { margin-bottom: 15px; }
label { display: block; font-size: 11px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; font-family: 'JetBrains Mono'; }
input, select { 
  width: 100%; background: var(--bg3); border: 1px solid var(--border); 
  border-radius: 8px; padding: 12px; color: white; font-family: inherit;
}
input:focus { border-color: var(--accent); outline: none; }

/* Multi-villes */
.city-row { display: grid; grid-template-columns: 2fr 1fr 1fr 40px; gap: 10px; margin-bottom: 10px; align-items: center; }
.btn-add { background: none; border: 1px dashed var(--accent); color: var(--accent); padding: 10px; width: 100%; cursor: pointer; border-radius: 8px; }

/* What If */
.wi-card { border: 1px solid var(--accent); background: rgba(212, 135, 90, 0.05); }
.wi-total { font-size: 28px; font-family: 'JetBrains Mono'; color: var(--accent); }

/* Recaps */
.pill { background: var(--bg3); border: 1px solid var(--border); padding: 4px 10px; border-radius: 20px; font-size: 12px; margin-right: 5px; }
.total-main { font-size: 48px; font-family: 'JetBrains Mono'; color: var(--accent); margin: 10px 0; }

#itineraryRecap { margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border); font-size: 14px; color: var(--muted); }
</style>
</head>
<body>

<div class="container">
  <div class="main">
    <div class="card">
      <h2>🌍 Configuration du Voyage</h2>
      <div class="grid">
        <div class="f-group"><label>Nom Simulation</label><input type="text" id="simName"></div>
        <div class="f-group"><label>Période (ex: Mai 2025)</label><input type="text" id="travelPeriod"></div>
      </div>
      <div class="grid">
        <div class="f-group"><label>Date Début</label><input type="date" id="dateFrom" onchange="calcNights()"></div>
        <div class="f-group"><label>Date Fin</label><input type="date" id="dateTo" onchange="calcNights()"></div>
      </div>
      <div class="grid">
        <div class="f-group"><label>Destination</label><input type="text" id="destination"></div>
        <div class="f-group"><label>Budget Max (Total)</label><input type="number" id="budget"></div>
      </div>
    </div>

    <div class="card">
      <h2>✈️ Vols</h2>
      <div class="grid" style="grid-template-columns: 1fr auto;">
        <div class="f-group"><label>Prix Total des Vols</label><input type="number" id="flightsTotal" oninput="updateAll()"></div>
        <div class="f-group" style="display:flex; align-items:flex-end;">
          <button class="btn-add" onclick="fetchFlightApi()" style="padding:12px; border-style:solid;">🔍 Scanner Vols</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>🏨 Hébergement (Multi-villes)</h2>
      <div id="cityList"></div>
      <button class="btn-add" onclick="addCity()">+ Ajouter une étape/ville</button>
    </div>

    <div class="card">
      <h2>🏷️ Autre & Imprévus</h2>
      <div class="grid">
        <div class="f-group"><label>Montant (ex: Escale)</label><input type="number" id="otherTotal" oninput="updateAll()"></div>
        <div class="f-group"><label>Commentaire</label><input type="text" id="otherComment" placeholder="Nuit d'hôtel escale, visa..."></div>
      </div>
    </div>
  </div>

  <div class="sidebar">
    <div class="card">
      <label>Coût Total Estimé</label>
      <div class="total-main" id="displayTotal">0 €</div>
      <div id="statusBudget"></div>
      
      <div id="itineraryRecap">
        <em>Remplissez les dates et les villes...</em>
      </div>
    </div>

    <div class="card">
      <canvas id="chartBudget" height="200"></canvas>
    </div>

    <div class="card wi-card">
      <h2>🤔 Et si... (What-If)</h2>
      <div class="f-group">
        <label>Ajouter des nuits (+ prix moy/nuit)</label>
        <input type="range" id="wi_nights" min="0" max="14" value="0" oninput="updateWhatIf()">
        <span id="wi_nights_label" class="pill">0 nuit sup.</span>
      </div>
      <div class="f-group">
        <label>Extra Budget Repas / Jour</label>
        <input type="range" id="wi_food" min="0" max="200" value="0" oninput="updateWhatIf()">
        <span id="wi_food_label" class="pill">0 € / jour</span>
      </div>
      <div class="wi-total" id="wi_total_display">0 €</div>
    </div>

    <button class="btn-add" id="saveBtn" onclick="saveToSheet()" style="background:var(--accent); color:black; font-weight:bold; border:none; height:50px;">💾 Sauvegarder dans Google Sheet</button>
  </div>
</div>

<script>
let cities = [{city: '', nights: 0, total: 0}];
let myChart = null;
let currentTotal = 0;

function addCity() {
  cities.push({city: '', nights: 0, total: 0});
  renderCities();
}

function renderCities() {
  const container = document.getElementById('cityList');
  container.innerHTML = cities.map((c, i) => `
    <div class="city-row">
      <input type="text" placeholder="Ville" value="${c.city}" oninput="updateCity(${i}, 'city', this.value)">
      <input type="number" placeholder="Nuits" value="${c.nights}" oninput="updateCity(${i}, 'nights', this.value)">
      <input type="number" placeholder="Prix Total" value="${c.total}" oninput="updateCity(${i}, 'total', this.value)">
      <button onclick="removeCity(${i})" style="background:none; border:none; color:red; cursor:pointer;">✕</button>
    </div>
  `).join('');
  updateAll();
}

function updateCity(i, key, val) {
  cities[i][key] = (key === 'city') ? val : parseFloat(val || 0);
  updateAll();
}

function removeCity(i) {
  cities.splice(i, 1);
  renderCities();
}

function calcNights() {
  const d1 = new Date(document.getElementById('dateFrom').value);
  const d2 = new Date(document.getElementById('dateTo').value);
  if (d1 && d2 && d2 > d1) {
    const diff = Math.ceil((d2 - d1) / (1000 * 60 * 60 * 24));
    // Optionnel : Alerte si le total des villes != diff nuits
  }
}

function updateAll() {
  const flights = parseFloat(document.getElementById('flightsTotal').value || 0);
  const others = parseFloat(document.getElementById('otherTotal').value || 0);
  const hotelTotal = cities.reduce((sum, c) => sum + (c.total || 0), 0);
  
  currentTotal = flights + others + hotelTotal;
  document.getElementById('displayTotal').innerText = currentTotal.toLocaleString() + ' €';
  
  // Itinéraire Recap
  const itinerary = cities.filter(c => c.city).map(c => `<b>${c.nights}j</b> à ${c.city}`).join(', ');
  document.getElementById('itineraryRecap').innerHTML = itinerary ? "📍 Trajet : " + itinerary : "<em>En attente d'étapes...</em>";

  updateChart(flights, hotelTotal, others);
  updateWhatIf();
}

function updateChart(f, h, o) {
  const ctx = document.getElementById('chartBudget').getContext('2d');
  if (myChart) myChart.destroy();
  myChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Vols', 'Hébergement', 'Autres'],
      datasets: [{
        data: [f, h, o],
        backgroundColor: ['#d4875a', '#74b9ff', '#a29bfe'],
        borderWidth: 0
      }]
    },
    options: { cutout: '80%', plugins: { legend: { display: false } } }
  });
}

function updateWhatIf() {
  const addNights = parseInt(document.getElementById('wi_nights').value);
  const addFood = parseInt(document.getElementById('wi_food').value);
  
  document.getElementById('wi_nights_label').innerText = addNights + " nuits sup.";
  document.getElementById('wi_food_label').innerText = addFood + " € / jour";

  const nights = cities.reduce((sum, c) => sum + (c.nights || 0), 0) || 1;
  const avgNight = currentTotal / nights;
  
  const wiTotal = currentTotal + (addNights * avgNight) + (addFood * nights);
  document.getElementById('wi_total_display').innerText = Math.round(wiTotal).toLocaleString() + ' €';
}

function fetchFlightApi() {
  const dest = document.getElementById('destination').value;
  if(!dest) return alert("Précisez d'abord la destination");
  
  alert("Recherche du meilleur prix (1 escale max) pour " + dest + "...");
  // Ici on simule l'appel API (FlightAPI.io ou Amadeus)
  setTimeout(() => {
    const fakePrice = Math.floor(Math.random() * 500) + 400;
    document.getElementById('flightsTotal').value = fakePrice;
    updateAll();
  }, 1500);
}

function saveToSheet() {
  const btn = document.getElementById('saveBtn');
  btn.innerText = "⏳ Enregistrement...";
  
  const payload = {
    simName: document.getElementById('simName').value,
    travelPeriod: document.getElementById('travelPeriod').value,
    destination: document.getElementById('destination').value,
    dateFrom: document.getElementById('dateFrom').value,
    dateTo: document.getElementById('dateTo').value,
    budget: document.getElementById('budget').value,
    currency: "€",
    flightsTotal: document.getElementById('flightsTotal').value,
    cities: cities,
    otherTotal: document.getElementById('otherTotal').value,
    otherComment: document.getElementById('otherComment').value,
    totalCost: currentTotal
  };

  google.script.run.withSuccessHandler(() => {
    btn.innerText = "✅ Sauvegardé !";
    setTimeout(() => btn.innerText = "💾 Sauvegarder dans Google Sheet", 2000);
  }).saveData(payload);
}

// Init
renderCities();
</script>
</body>
</html>
