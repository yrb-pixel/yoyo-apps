<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Voyage — Expert</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
    --bg: #0b0d12;
    --card: #151921;
    --card-h: #1c222d;
    --border: rgba(255,255,255,0.06);
    --accent: #d4875a;
    --accent-dim: rgba(212, 135, 90, 0.15);
    --text: #e2e4e9;
    --text-dim: #8a8f9d;
    --green: #6db58a;
    --red: #d46b6b;
    --radius: 14px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
    background: var(--bg); 
    color: var(--text); 
    font-family: 'Outfit', sans-serif; 
    background-image: radial-gradient(circle at 50% -20%, #1e2535 0%, var(--bg) 80%);
    min-height: 100vh;
}

/* NAVIGATION */
.nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(11, 13, 18, 0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
}
.nav-inner { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; gap: 30px; }
.logo { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; flex: 1; }
.logo em { color: var(--accent); font-style: italic; }

.tabs { display: flex; background: #000; padding: 4px; border-radius: 10px; border: 1px solid var(--border); }
.tab { 
    padding: 6px 16px; border: none; background: none; color: var(--text-dim); 
    cursor: pointer; border-radius: 7px; font-size: 14px; transition: 0.2s;
}
.tab.active { background: var(--card); color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.4); }

/* LAYOUT */
.app { max-width: 1400px; margin: 30px auto; padding: 0 24px; }
.panel { display: none; gap: 24px; }
.panel.active { display: grid; grid-template-columns: 1fr 400px; }
@media (max-width: 1000px) { .panel.active { grid-template-columns: 1fr; } }

.card { 
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); 
    padding: 24px; margin-bottom: 20px;
}
.card-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
.card-title span { color: var(--accent); }

/* FORMS */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
.form-group { margin-bottom: 16px; }
label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 6px; font-family: 'JetBrains Mono'; }
input, select, textarea { 
    width: 100%; background: #0b0d12; border: 1px solid var(--border); 
    border-radius: 8px; padding: 10px 12px; color: white; font-family: inherit; font-size: 14px;
}
input:focus { border-color: var(--accent); outline: none; }

.sep { height: 1px; background: var(--border); margin: 20px 0; position: relative; }
.sep::after { content: attr(data-label); position: absolute; top: -10px; left: 20px; background: var(--card); padding: 0 10px; font-size: 9px; color: var(--text-dim); font-family: 'JetBrains Mono'; }

/* EXPENSES LIST */
.exp-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.exp-row label { margin-bottom: 0; text-transform: none; font-family: 'Outfit'; font-size: 14px; color: var(--text); }
.exp-row input { width: 110px; text-align: right; font-family: 'JetBrains Mono'; font-size: 13px; border-color: transparent; background: rgba(0,0,0,0.2); }
.exp-row input:focus { border-color: var(--accent); }

/* SIDEBAR & STATS */
.total-box { background: linear-gradient(145deg, #1c222d 0%, #151921 100%); border: 1px solid var(--accent-dim); }
.amount-main { font-family: 'JetBrains Mono'; font-size: 32px; color: var(--accent); margin: 5px 0; }
.stat-mini-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
.stat-mini { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; text-align: center; }
.stat-mini small { display: block; font-size: 9px; color: var(--text-dim); text-transform: uppercase; margin-top: 4px; }

.sim-item { 
    background: #0b0d12; border: 1px solid var(--border); padding: 12px 15px; 
    border-radius: 10px; margin-bottom: 10px; cursor: pointer; transition: 0.2s;
    display: flex; justify-content: space-between; align-items: center;
}
.sim-item:hover { border-color: var(--accent); background: #151921; }
.sim-item.active { border-color: var(--accent); background: var(--accent-dim); }
.sim-name { font-size: 14px; font-weight: 500; }
.sim-meta { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

/* COMPARATOR */
.comp-table-wrap { overflow-x: auto; }
.comp-table { width: 100%; border-collapse: collapse; min-width: 600px; }
.comp-table th { text-align: left; padding: 15px; font-family: 'JetBrains Mono'; font-size: 11px; color: var(--text-dim); border-bottom: 1px solid var(--border); }
.comp-table td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 14px; }
.best { color: var(--green); font-weight: 600; }

.btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: 500; font-family: inherit; font-size: 13px; transition: 0.2s; }
.btn-p { background: var(--accent); color: white; }
.btn-s { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-p:hover { opacity: 0.9; }

.chart-container { height: 220px; position: relative; }
</style>
</head>
<body>

<nav class="nav">
    <div class="nav-inner">
        <div class="logo">Budget <em>Voyage</em></div>
        <div class="tabs">
            <button class="tab active" onclick="switchTab('simulator')">Simulateur</button>
            <button class="tab" onclick="switchTab('comparator')">Comparateur</button>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn btn-s" onclick="resetForm()">Nouveau</button>
            <button class="btn btn-p" id="saveBtn" onclick="saveToSheets()">Sauvegarder</button>
        </div>
    </div>
</nav>

<div class="app">
    <div id="panel-simulator" class="panel active">
        <div class="main-content">
            <div class="card">
                <div class="card-title"><span>✈</span> Configuration du Voyage</div>
                <div class="form-group">
                    <label>Nom de la simulation</label>
                    <input type="text" id="simName" placeholder="Ex: Norvège — Roadtrip Mai">
                </div>
                <div class="grid-2">
                    <div class="form-group"><label>Destination</label><input type="text" id="destination"></div>
                    <div class="form-group">
                        <label>Monnaie</label>
                        <select id="currency" onchange="runCalc()">
                            <option value="€">EUR (€)</option>
                            <option value="NOK">NOK</option>
                            <option value="CHF">CHF</option>
                            <option value="$">USD ($)</option>
                        </select>
                    </div>
                </div>
                <div class="grid-2">
                    <div class="form-group"><label>Date de départ</label><input type="date" id="dateFrom" onchange="runCalc()"></div>
                    <div class="form-group"><label>Date de retour</label><input type="date" id="dateTo" onchange="runCalc()"></div>
                </div>
                <div class="grid-2">
                    <div class="form-group"><label>Voyageurs</label><input type="number" id="travelers" value="2" oninput="runCalc()"></div>
                    <div class="form-group"><label>Budget Cible</label><input type="number" id="budget" placeholder="5000" oninput="runCalc()"></div>
                </div>
            </div>

            <div class="card">
                <div class="card-title"><span>📋</span> Détail des Dépenses</div>
                
                <div class="sep" data-label="LOGISTIQUE"></div>
                <div class="exp-row"><label>Vols A/R (total)</label><input type="number" id="c_vols" oninput="runCalc()"></div>
                <div class="exp-row"><label>Hébergement / nuit</label><input type="number" id="c_hotel_night" oninput="runCalc()"></div>
                <div class="exp-row"><label>Location voiture / jour</label><input type="number" id="c_car_day" oninput="runCalc()"></div>
                <div class="exp-row"><label>Carburant (total)</label><input type="number" id="c_fuel" oninput="runCalc()"></div>

                <div class="sep" data-label="VIE QUOTIDIENNE"></div>
                <div class="exp-row"><label>Resto & Sorties / jour / pers</label><input type="number" id="c_food_day" oninput="runCalc()"></div>
                <div class="exp-row"><label>Courses / jour / pers</label><input type="number" id="c_grocery_day" oninput="runCalc()"></div>
                <div class="exp-row"><label>Activités & Visites</label><input type="number" id="c_activities" oninput="runCalc()"></div>

                <div class="sep" data-label="EXTRAS"></div>
                <div class="exp-row"><label>Shopping & Cadeaux</label><input type="number" id="c_shopping" oninput="runCalc()"></div>
                <div class="exp-row"><label>Assurance & Divers</label><input type="number" id="c_misc" oninput="runCalc()"></div>
            </div>
        </div>

        <div class="sidebar">
            <div class="card total-box">
                <label>Estimation Totale</label>
                <div class="amount-main" id="res-total">0 €</div>
                <div id="res-remain" style="font-size: 13px; color: var(--text-dim);">Reste : --</div>
                
                <div class="stat-mini-grid">
                    <div class="stat-mini"><span id="res-days">0</span><small>Jours</small></div>
                    <div class="stat-mini"><span id="res-pp">0 €</span><small>/ Pers</small></div>
                    <div class="stat-mini"><span id="res-pd">0 €</span><small>/ Jour</small></div>
                </div>
            </div>

            <div class="card">
                <div class="chart-container"><canvas id="pieChart"></canvas></div>
            </div>

            <div class="card">
                <div class="card-title" style="margin-bottom:15px"><span>🗂</span> Sauvegardes</div>
                <div id="sim-list">
                    <div style="text-align:center; padding:20px; color:var(--text-dim); font-size:12px;">Chargement...</div>
                </div>
            </div>
        </div>
    </div>

    <div id="panel-comparator" class="panel">
        <div class="card" style="grid-column: 1 / -1;">
            <div class="card-title"><span>⇄</span> Comparaison des Scénarios</div>
            <div class="comp-table-wrap" id="comp-wrap">
                <p style="color:var(--text-dim)">Ajoutez au moins deux scénarios pour comparer.</p>
            </div>
        </div>
    </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxNggQfKcvVvljLkWIrdnbUgjCrPS5dKpQuIy1IjdvFv-O9Fvh0p9sfYBDjgOnheCqR/exec';

let simulations = [];
let myChart = null;
let activeId = null;

// --- CALCULS ---
function runCalc() {
    const cur = document.getElementById('currency').value;
    const travelers = parseFloat(document.getElementById('travelers').value) || 1;
    const budget = parseFloat(document.getElementById('budget').value) || 0;
    
    // Dates
    const d1 = new Date(document.getElementById('dateFrom').value);
    const d2 = new Date(document.getElementById('dateTo').value);
    let days = Math.ceil((d2 - d1) / (1000 * 60 * 60 * 24)) || 0;
    if (days < 0) days = 0;

    // Postes
    const vols = parseFloat(document.getElementById('c_vols').value) || 0;
    const hotel = (parseFloat(document.getElementById('c_hotel_night').value) || 0) * days;
    const car = (parseFloat(document.getElementById('c_car_day').value) || 0) * days;
    const fuel = parseFloat(document.getElementById('c_fuel').value) || 0;
    const food = (parseFloat(document.getElementById('c_food_day').value) || 0 + parseFloat(document.getElementById('c_grocery_day').value) || 0) * days * travelers;
    const act = parseFloat(document.getElementById('c_activities').value) || 0;
    const misc = (parseFloat(document.getElementById('c_shopping').value) || 0) + (parseFloat(document.getElementById('c_misc').value) || 0);

    const total = vols + hotel + car + fuel + food + act + misc;
    const remain = budget - total;

    // UI
    document.getElementById('res-total').textContent = `${total.toLocaleString()} ${cur}`;
    document.getElementById('res-days').textContent = days;
    document.getElementById('res-pp').textContent = `${Math.round(total/travelers).toLocaleString()} ${cur}`;
    document.getElementById('res-pd').textContent = `${Math.round(total/(days||1)).toLocaleString()} ${cur}`;
    
    const remEl = document.getElementById('res-remain');
    if(budget > 0) {
        remEl.textContent = `Reste : ${remain.toLocaleString()} ${cur}`;
        remEl.style.color = remain >= 0 ? 'var(--green)' : 'var(--red)';
    }

    updateChart([vols, hotel, car + fuel, food, act, misc]);
}

function updateChart(data) {
    const ctx = document.getElementById('pieChart').getContext('2d');
    if (myChart) myChart.destroy();
    myChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['Vols', 'Logement', 'Transport', 'Repas', 'Activités', 'Autres'],
            datasets: [{
                data: data,
                backgroundColor: ['#d4875a', '#6db58a', '#6b9fd4', '#9b7fc4', '#c9a84c', '#d46b6b'],
                borderWidth: 0
            }]
        },
        options: { 
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            cutout: '80%'
        }
    });
}

// --- GOOGLE SHEETS API ---
async function fetchSims() {
    try {
        const r = await fetch(SCRIPT_URL);
        simulations = await r.json();
        renderList();
    } catch(e) { console.error("Erreur Sheets", e); }
}

async function saveToSheets() {
    const btn = document.getElementById('saveBtn');
    const name = document.getElementById('simName').value;
    if(!name) return alert("Donne un nom à ta simulation !");
    
    btn.textContent = "Envoi...";
    btn.disabled = true;

    const data = {
        id: activeId || 'sim_' + Date.now(),
        simName: name,
        destination: document.getElementById('destination').value,
        currency: document.getElementById('currency').value,
        dateFrom: document.getElementById('dateFrom').value,
        dateTo: document.getElementById('dateTo').value,
        travelers: document.getElementById('travelers').value,
        budget: document.getElementById('budget').value,
        c_vols: document.getElementById('c_vols').value || 0,
        c_hotel_night: document.getElementById('c_hotel_night').value || 0,
        c_car_day: document.getElementById('c_car_day').value || 0,
        c_fuel: document.getElementById('c_fuel').value || 0,
        c_food_day: document.getElementById('c_food_day').value || 0,
        c_grocery_day: document.getElementById('c_grocery_day').value || 0,
        c_activities: document.getElementById('c_activities').value || 0,
        c_shopping: document.getElementById('c_shopping').value || 0,
        c_misc: document.getElementById('c_misc').value || 0,
        updatedAt: new Date().toISOString()
    };

    await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'save', simulation: data })
    });

    activeId = data.id;
    btn.textContent = "Sauvegarder";
    btn.disabled = false;
    fetchSims();
}

function renderList() {
    const container = document.getElementById('sim-list');
    if(simulations.length === 0) {
        container.innerHTML = `<div style="text-align:center; padding:20px; color:var(--text-dim); font-size:12px;">Aucun scénario</div>`;
        return;
    }
    container.innerHTML = simulations.map(s => `
        <div class="sim-item ${activeId === s.id ? 'active' : ''}" onclick="loadSim('${s.id}')">
            <div>
                <div class="sim-name">${s.simName}</div>
                <div class="sim-meta">${s.destination || 'N/A'} • ${s.budget}${s.currency}</div>
            </div>
            <div style="font-family:'JetBrains Mono'; font-size:11px; color:var(--accent)">></div>
        </div>
    `).join('');
}

function loadSim(id) {
    activeId = id;
    const s = simulations.find(x => x.id === id);
    if(!s) return;
    
    const fields = ['simName','destination','currency','dateFrom','dateTo','travelers','budget','c_vols','c_hotel_night','c_car_day','c_fuel','c_food_day','c_grocery_day','c_activities','c_shopping','c_misc'];
    fields.forEach(f => {
        if(document.getElementById(f)) document.getElementById(f).value = s[f] || "";
    });
    
    renderList();
    runCalc();
}

function resetForm() {
    activeId = null;
    document.querySelectorAll('input').forEach(i => i.value = "");
    document.getElementById('travelers').value = 2;
    document.getElementById('currency').value = "€";
    renderList();
    runCalc();
}

// --- TABS & COMPARATOR ---
function switchTab(name) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
    event.target.classList.add('active');
    if(name === 'comparator') renderComparator();
}

function renderComparator() {
    const wrap = document.getElementById('comp-wrap');
    if(simulations.length < 2) {
        wrap.innerHTML = `<p style="color:var(--text-dim); padding:20px;">Sauvegardez au moins 2 scénarios pour comparer.</p>`;
        return;
    }

    let html = `<table class="comp-table"><thead><tr><th>Critères</th>`;
    simulations.forEach(s => html += `<th>${s.simName}</th>`);
    html += `</tr></thead><tbody>`;

    const rows = [
        {n: 'Destination', k: 'destination'},
        {n: 'Budget Max', k: 'budget'},
        {n: 'Voyageurs', k: 'travelers'},
        {n: 'Vols', k: 'c_vols'}
    ];

    rows.forEach(r => {
        html += `<tr><td>${r.n}</td>`;
        simulations.forEach(s => html += `<td>${s[r.k] || '—'}</td>`);
        html += `</tr>`;
    });

    html += `</tbody></table>`;
    wrap.innerHTML = html;
}

// Init
fetchSims();
runCalc();
</script>

</body>
</html>
